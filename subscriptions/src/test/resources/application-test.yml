spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Stub JWKs URI for test context — NimbusJwtDecoder is built lazily so
          # no network call is made at startup. Tests that need to mint tokens
          # use SecurityMockMvcRequestPostProcessors.jwt().
          jwk-set-uri: http://localhost/.well-known/jwks.json
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test
    compatibility-verifier:
      enabled: false
