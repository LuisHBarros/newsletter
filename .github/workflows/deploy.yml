name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force full deploy (bypasses change detection)'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

# Evita deploys concorrentes na mesma branch (race em Terraform state / ECS).
# PRs tem grupo proprio para nao bloquearem push em main.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      billing: ${{ steps.filter.outputs.billing }}
      content: ${{ steps.filter.outputs.content }}
      subscriptions: ${{ steps.filter.outputs.subscriptions }}
      notifications: ${{ steps.filter.outputs.notifications }}
      access: ${{ steps.filter.outputs.access }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            billing:
              - 'billing/**'
            content:
              - 'content/**'
            subscriptions:
              - 'subscriptions/**'
            notifications:
              - 'notifications/**'
            access:
              - 'access/**'
            infra:
              - 'infra/**'
              - 'docs/api/**'

  # Fase 1 do apply: cria apenas os recursos de base que precisam existir
  # ANTES do build/push das imagens (ECR, VPC, IAM, RDS, SQS, Cognito).
  # Em pushes subsequentes sem mudanca em infra/** este job eh pulado.
  # Em pushes com mudanca em infra/** o apply -target eh idempotente (no-op
  # se nada mudou nesses modulos) e o deploy-infra final aplica o resto.
  infra-bootstrap:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      ran: ${{ steps.apply.outputs.ran }}
    if: |
      (needs.detect-changes.outputs.infra == 'true' || inputs.force_deploy == 'true') &&
      github.event_name != 'pull_request'
    env:
      TF_VAR_acm_cert_arn: ${{ secrets.ACM_CERT_ARN }}
      TF_VAR_ses_sender_identity_arn: ${{ secrets.SES_SENDER_IDENTITY_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Lambda bootstrap dependencies
        run: pip install -q -r infra/terraform/modules/rds/files/requirements.txt -t infra/terraform/modules/rds/files --upgrade

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        working-directory: infra/terraform/envs/prod
        run: terraform init -input=false

      - name: Terraform Apply (bootstrap targets)
        id: apply
        working-directory: infra/terraform/envs/prod
        run: |
          # module.lambda NAO eh alvo aqui de proposito: as Lambdas referenciam
          # ${ecr_repo}:latest, que so passa a existir apos build-lambda-go.
          # O apply completo em deploy-infra (Fase 2) cria as Lambdas com as
          # imagens ja publicadas.
          terraform apply -input=false -auto-approve \
            -var-file=prod.tfvars \
            -target=module.ecr \
            -target=module.vpc \
            -target=module.security_groups \
            -target=module.iam \
            -target=module.rds \
            -target=module.sqs \
            -target=module.cognito
          echo "ran=true" >> $GITHUB_OUTPUT

  build-java:
    needs: [detect-changes, infra-bootstrap]
    if: |
      always() &&
      (needs.infra-bootstrap.result == 'success' || needs.infra-bootstrap.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [billing, content, subscriptions]
    steps:
      - uses: actions/checkout@v4

      - name: Check if this service changed
        id: changed
        run: |
          case "${{ matrix.service }}" in
            billing)       CHANGED="${{ needs.detect-changes.outputs.billing }}" ;;
            content)       CHANGED="${{ needs.detect-changes.outputs.content }}" ;;
            subscriptions) CHANGED="${{ needs.detect-changes.outputs.subscriptions }}" ;;
          esac
          BOOTSTRAP_RAN="${{ needs.infra-bootstrap.outputs.ran }}"
          FORCE="${{ inputs.force_deploy }}"
          if [ "$CHANGED" == "true" ] || [ "$BOOTSTRAP_RAN" == "true" ] || [ "$FORCE" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Skipping ${{ matrix.service }} - no changes detected"
          fi

      - uses: actions/setup-java@v4
        if: steps.changed.outputs.changed == 'true'
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        if: steps.changed.outputs.changed == 'true'
        working-directory: ${{ matrix.service }}
        run: mvn test

      - name: Configure AWS credentials (OIDC)
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Build & push Docker image
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          # Context eh o diretorio do servico (nao a raiz do repo): o Dockerfile
          # faz COPY mvnw/.mvn/pom.xml/src relativos ao proprio diretorio.
          context: ${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/assine/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/assine/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Deploy to ECS (pin SHA in new task definition)
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          CLUSTER: assine-prod
          SERVICE: assine-${{ matrix.service }}-prod
          CONTAINER: ${{ matrix.service }}
        run: |
          set -euo pipefail
          NEW_IMAGE="$ECR_REGISTRY/assine/${{ matrix.service }}:$IMAGE_TAG"
          CURRENT_TD_ARN=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition --task-definition "$CURRENT_TD_ARN" \
            --query 'taskDefinition' > td.json
          jq --arg IMG "$NEW_IMAGE" --arg NAME "$CONTAINER" '
            .containerDefinitions |= map(if .name == $NAME then .image = $IMG else . end)
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' td.json > td-new.json
          NEW_TD_ARN=$(aws ecs register-task-definition --cli-input-json file://td-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --task-definition "$NEW_TD_ARN"
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"

  build-lambda-go:
    needs: [detect-changes, infra-bootstrap]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [notifications, access]
    if: |
      always() &&
      (needs.infra-bootstrap.result == 'success' || needs.infra-bootstrap.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Check if this service changed
        id: changed
        run: |
          case "${{ matrix.service }}" in
            notifications) CHANGED="${{ needs.detect-changes.outputs.notifications }}" ;;
            access)        CHANGED="${{ needs.detect-changes.outputs.access }}" ;;
          esac
          BOOTSTRAP_RAN="${{ needs.infra-bootstrap.outputs.ran }}"
          FORCE="${{ inputs.force_deploy }}"
          if [ "$CHANGED" == "true" ] || [ "$BOOTSTRAP_RAN" == "true" ] || [ "$FORCE" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Skipping ${{ matrix.service }} - no changes detected"
          fi

      - uses: actions/setup-go@v5
        if: steps.changed.outputs.changed == 'true'
        with:
          go-version: '1.22'

      - name: Run tests
        if: steps.changed.outputs.changed == 'true'
        working-directory: ${{ matrix.service }}
        run: go test ./...

      - name: Configure AWS credentials (OIDC)
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Go bootstrap binary
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        working-directory: ${{ matrix.service }}
        run: GOOS=linux GOARCH=arm64 go build -o bootstrap .

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Build & push Lambda container image
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          platforms: linux/arm64
          # Lambda requires Docker v2 schema 2 manifests; disable provenance/SBOM
          # attestations so Buildx does not wrap the image in an OCI index
          # (which Lambda rejects with "image manifest ... is not supported").
          provenance: false
          sbom: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/assine/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/assine/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Update Lambda function
        if: steps.changed.outputs.changed == 'true' && github.event_name != 'pull_request'
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name assine-${{ matrix.service }}-prod \
            --image-uri $ECR_REGISTRY/assine/${{ matrix.service }}:$IMAGE_TAG

  # Fase 2 do apply: recursos que dependem das imagens ja existirem no ECR
  # (ECS services, Lambdas, ALB listener rules, API Gateway, monitoring).
  # Eh um apply completo idempotente; em pushes sem mudanca em infra/** pula.
  deploy-infra:
    needs: [detect-changes, infra-bootstrap, build-java, build-lambda-go]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.detect-changes.outputs.infra == 'true' || inputs.force_deploy == 'true') &&
      github.event_name != 'pull_request' &&
      needs.infra-bootstrap.result == 'success' &&
      (needs.build-java.result == 'success' || needs.build-java.result == 'skipped') &&
      (needs.build-lambda-go.result == 'success' || needs.build-lambda-go.result == 'skipped')
    env:
      TF_VAR_acm_cert_arn: ${{ secrets.ACM_CERT_ARN }}
      TF_VAR_ses_sender_identity_arn: ${{ secrets.SES_SENDER_IDENTITY_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Lambda bootstrap dependencies
        run: pip install -q -r infra/terraform/modules/rds/files/requirements.txt -t infra/terraform/modules/rds/files --upgrade

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Verify ECR images exist before apply
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for svc in access notifications billing content subscriptions; do
            aws ecr describe-images \
              --repository-name assine/$svc \
              --image-ids imageTag=$IMAGE_TAG \
              --region ${{ env.AWS_REGION }} 2>/dev/null || \
            aws ecr describe-images \
              --repository-name assine/$svc \
              --image-ids imageTag=latest \
              --region ${{ env.AWS_REGION }} || \
              (echo "No image for assine/$svc found in ECR. Aborting." && exit 1)
          done

      - name: Terraform Init
        working-directory: infra/terraform/envs/prod
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: infra/terraform/envs/prod
        run: terraform plan -input=false -var-file=prod.tfvars -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform/envs/prod
        run: terraform apply -input=false -auto-approve tfplan