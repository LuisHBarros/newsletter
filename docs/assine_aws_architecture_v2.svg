<svg width="100%" viewBox="0 0 760 640" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Arquitetura AWS — Assine v2</title>
<desc>Diagrama AWS atualizado: API Gateway, Cognito, ECS Fargate (Java/Spring Boot), Lambda (Golang), SQS, SES, S3, RDS PostgreSQL, DynamoDB, CloudWatch.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#9C9A92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-light" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#C2C0B6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ═══════════════════════════════════════════════ -->
<!-- Row 1: Client -->
<!-- ═══════════════════════════════════════════════ -->
<rect x="295" y="20" width="170" height="44" rx="8" fill="#444441" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="380" y="37" text-anchor="middle" dominant-baseline="central" fill="#D3D1C7" font-family="system-ui,sans-serif" font-size="14" font-weight="500">Cliente</text>
<text x="380" y="53" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9" font-family="system-ui,sans-serif" font-size="12">Browser / Mobile</text>

<!-- Client → API GW -->
<line x1="380" y1="64" x2="380" y2="98" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
<!-- Client → CloudFront (dashed) -->
<path d="M312 46 Q175 62 162 98" fill="none" stroke="#9C9A92" stroke-width="1" stroke-dasharray="4 3" opacity="0.5" marker-end="url(#arrow-gray)"/>

