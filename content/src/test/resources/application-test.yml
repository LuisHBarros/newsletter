spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Stub JWKs URI — NimbusJwtDecoder is built lazily; no network call at startup.
          jwk-set-uri: http://localhost/.well-known/jwks.json
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test
    compatibility-verifier:
      enabled: false

aws:
  sqs:
    events:
      queue: assine-events
      dlq: assine-events-dlq
    contentJobs:
      queue: assine-content-jobs
      dlq: assine-content-jobs-dlq

content:
  notion:
    api-base-url: http://localhost/notion
    api-token: test-token
    webhook-secret: test-secret
  storage:
    bucket: assine-content-test
    key-prefix: content
  scheduler:
    publish-scheduled:
      enabled: false
    reconcile-notion:
      enabled: false
  outbox:
    relay:
      enabled: false
